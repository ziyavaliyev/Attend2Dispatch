seed: 42

data:
  n_jobs: 6
  n_machines: 6
  n_train_instances: 1000
  n_val_instances: 100
  min_duration: 1
  max_duration: 99
  val_dataset_path: data/val_dataset_6x6.pt

model:
  hidden_dim: 128
  n_heads: 4
  n_layers: 3
  dropout: 0.1

gat:
  hidden_dim: 128
  out_dim: 128
  heads: 4
  layers: 1

ppo:
  total_timesteps: 1000000
  num_envs: 8
  num_steps: 128
  learning_rate: 0.0003
  anneal_lr: true
  gamma: 0.99
  gae_lambda: 0.95
  num_minibatches: 4
  update_epochs: 4
  norm_adv: true
  clip_coef: 0.2
  clip_vloss: true
  ent_coef: 0.03
  vf_coef: 0.5
  max_grad_norm: 0.5
  target_kl: null

logging:
  use_wandb: true
  project: Attend2Dispatch
  run_name: ppo_6x6
  eval_every: 10000