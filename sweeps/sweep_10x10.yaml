name: ppo_10x10
program: scripts/train_ppo.py
method: grid

metric:
  name: val/best_optimality_gap_percent
  goal: minimize

parameters:
  representation:
    values:
      - handcrafted
      - raw_graph
      - graph_features
      - trained_encoder_weights/10x10/gae_gcn.pt
      - trained_encoder_weights/10x10/gae_egc.pt
      - trained_encoder_weights/10x10/gae_gin.pt
      - trained_encoder_weights/10x10/gae_pna.pt
      - trained_encoder_weights/10x10/gae_gat.pt
      - trained_encoder_weights/10x10/gae_gatv2.pt
      - trained_encoder_weights/10x10/vgae_gcn.pt
      - trained_encoder_weights/10x10/vgae_egc.pt
      - trained_encoder_weights/10x10/vgae_gin.pt
      - trained_encoder_weights/10x10/vgae_pna.pt
      - trained_encoder_weights/10x10/vgae_gat.pt
      - trained_encoder_weights/10x10/vgae_gatv2.pt

command:
  - ${env}
  - python
  - ${program}
  - --config
  - configs/ppo_10x10.yaml
  - ${args}